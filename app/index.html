<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym Tracker - Blueprint Edition</title>
    <style>
      /* Blueprint-inspired Base Styles */
      :root {
        --pt-dark-app-background-color: #10161a;
        --pt-dark-card-background-color: #182026;
        --pt-dark-border-color: rgba(16, 22, 26, 0.4);
        --pt-dark-divider-color: rgba(255, 255, 255, 0.15);
        --pt-dark-text-color: #f5f8fa;
        --pt-dark-text-color-muted: #a7b6c2;
        --pt-intent-primary: #137cbd;
        --pt-intent-success: #0f9960;
        --pt-intent-danger: #db3737;
        --pt-intent-warning: #d9822b;
        --pt-button-height: 30px;
        --pt-grid-size: 10px;
        --pt-border-radius: 3px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        background-color: var(--pt-dark-app-background-color);
        color: var(--pt-dark-text-color);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-size: 14px;
        line-height: 1.5;
        min-height: 100vh;
      }

      #app {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* Scrollbar Styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--pt-dark-app-background-color);
      }
      ::-webkit-scrollbar-thumb {
        background: #394b59;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #48aff0;
      }

      /* Blueprint Utility Classes */
      .bp3-dark {
        background-color: var(--pt-dark-app-background-color);
        color: var(--pt-dark-text-color);
      }

      .bp3-card {
        background: var(--pt-dark-card-background-color);
        border: 1px solid var(--pt-dark-border-color);
        border-radius: var(--pt-border-radius);
        box-shadow: 0 0 0 1px rgba(16, 22, 26, 0.4), 0 2px 4px rgba(16, 22, 26, 0.4), 0 8px 24px rgba(16, 22, 26, 0.4);
        padding: 20px;
      }

      .bp3-button {
        display: inline-flex;
        flex-direction: row;
        align-items: center;
        border: none;
        border-radius: var(--pt-border-radius);
        cursor: pointer;
        font-size: 14px;
        justify-content: center;
        padding: 0 15px;
        text-align: left;
        vertical-align: middle;
        min-height: var(--pt-button-height);
        min-width: var(--pt-button-height);
        background-color: #394b59;
        background-image: linear-gradient(to bottom, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0));
        box-shadow: inset 0 0 0 1px rgba(16, 22, 26, 0.4), inset 0 -1px 0 rgba(16, 22, 26, 0.2);
        color: #f5f8fa;
        transition: background-color 0.1s cubic-bezier(0.4, 1, 0.75, 0.9);
      }

      .bp3-button:hover {
        background-color: #485a6a;
      }

      .bp3-button:active {
        background-color: #2f3e4c;
        box-shadow: inset 0 0 0 1px rgba(16, 22, 26, 0.6), inset 0 1px 2px rgba(16, 22, 26, 0.2);
      }

      .bp3-button.bp3-intent-primary {
        background-color: var(--pt-intent-primary);
        color: #ffffff;
      }
      .bp3-button.bp3-intent-primary:hover {
        background-color: #106ba3;
      }

      .bp3-input {
        background: rgba(16, 22, 26, 0.3);
        box-shadow: inset 0 0 0 1px rgba(16, 22, 26, 0.4), inset 0 1px 1px rgba(16, 22, 26, 0.2);
        color: #f5f8fa;
        border: none;
        border-radius: var(--pt-border-radius);
        height: 30px;
        padding: 0 10px;
        font-size: 14px;
        outline: none;
        transition: box-shadow 0.1s cubic-bezier(0.4, 1, 0.75, 0.9);
      }

      .bp3-input:focus {
        box-shadow: 0 0 0 1px #137cbd, 0 0 0 3px rgba(19, 124, 189, 0.3), inset 0 1px 1px rgba(16, 22, 26, 0.2);
      }
    </style>
  </head>
  <body class="bp3-dark">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
